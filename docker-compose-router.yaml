version: "3.7"
networks:
  main:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
      driver: default
services:
  router:
    container_name: router
    build: 
      context: .
      dockerfile: Dockerfile-router
    image: richbu/img-router
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./richbudek_com.crt:/etc/nginx/certs/richbudek_com.crt;
      - ./richbudek_com.p7b:/etc/nginx/certs/richbudek_com.p7b;
    networks:
      main:
        ipv4_address: 172.20.0.13   
    ports:
      - "80:80"
      - "443:443"
